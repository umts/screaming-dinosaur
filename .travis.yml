language: ruby
rvm: 2.4.1
sudo: required
addons:
  chrome: stable
env:
  - 'DISPLAY=:99.0 CODECLIMATE_REPO_TOKEN=029db8a4d83b74b2b01b09670c9a28a9c353175415b61186e87a1d70fe461931 RAILS_ENV=test'
before_script:
  - sh -e /etc/init.d/xvfb start
  - sleep 3 # give Xvfb time to start
script: 
  - script/cibuild
  - bundle exec codeclimate-test-reporter
branches:
  only:
    - master
notifications:
  email:
    on_success: never
    on_failure: change
    recipients: programmers@admin.umass.edu
